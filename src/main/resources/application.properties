spring.application.name=ecommerce-config-server
server.port=8888

# Replace <github-username> with your GitHub username or organization name.
# Create the ecommerce-config-repo GitHub repository separately and add the
# service property files from the ecommerce-config-repo directory in this project.
spring.cloud.config.server.git.uri=https://github.com/<github-username>/ecommerce-config-repo

# Change this if the configuration repository uses a different default branch.
spring.cloud.config.server.git.default-label=main
